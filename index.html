<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Burger | Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .burger-card { border-radius: 2rem; }
    </style>
</head>
<body class="bg-gray-100 pb-10">

    <header class="bg-yellow-400 py-8 px-6 text-center shadow-md rounded-b-[3rem]">
        <h1 class="text-4xl font-black text-gray-900 italic tracking-tighter uppercase">Master Burger</h1>
        <p class="text-sm font-bold text-yellow-900 tracking-widest uppercase mt-1">Vibras Positivas Edition</p>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-6">
        <div class="bg-white burger-card shadow-2xl overflow-hidden border border-gray-100">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=800&auto=format&fit=crop" 
                     alt="La Master Burger" class="w-full h-72 object-cover">
                <div class="absolute top-4 right-4 bg-yellow-400 text-gray-900 font-black px-4 py-2 rounded-full text-xl shadow-lg">
                    $18.000
                </div>
            </div>

            <div class="p-8">
                <h2 class="text-3xl font-black text-gray-800 mb-2">La Máster Vibras</h2>
                <p class="text-gray-500 text-sm leading-relaxed mb-6">
                    Blend de 150g de carne premium, queso doble crema fundido, mermelada de tocino artesanal y pan brioche sellado en mantequilla.
                </p>

                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-2xl mb-6 border border-gray-200">
                    <button onclick="updateQty(-1)" class="w-12 h-12 bg-white rounded-xl shadow-sm text-2xl font-bold hover:bg-gray-100 active:scale-90 transition">-</button>
                    <span id="qty" class="text-2xl font-black">1</span>
                    <button onclick="updateQty(1)" class="w-12 h-12 bg-white rounded-xl shadow-sm text-2xl font-bold hover:bg-gray-100 active:scale-90 transition">+</button>
                </div>

                <div class="mb-8">
                    <label class="block text-xs font-black text-gray-400 uppercase mb-2 ml-1">Instrucciones Especiales</label>
                    <textarea id="notes" 
                        class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-yellow-400 focus:outline-none text-sm"
                        placeholder="Ej: Término medio, sin cebolla..." rows="2"></textarea>
                </div>

                <button onclick="sendOrder()" 
                    class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3 text-lg">
                    <i class="fab fa-whatsapp text-2xl"></i>
                    PEDIR POR WHATSAPP
                </button>
            </div>
        </div>

        <div class="mt-8 bg-gray-900 p-6 rounded-[2rem] text-center shadow-xl">
            <p class="text-yellow-400 font-bold italic mb-3">¿Ya la probaste? ¡Tu voto cuenta!</p>
            <a href="#" class="inline-block w-full bg-white text-gray-900 font-black py-3 rounded-xl uppercase text-sm hover:bg-yellow-400 transition">
                VOTAR EN EL MASTER
            </a>
        </div>
    </main>

    <footer class="text-center mt-8 text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em]">
        Desarrollado con agilidad • 2026
    </footer>

    <script>
        let quantity = 1;
        const burgerPrice = 18000;
        const phone = "573001234567"; // Reemplaza con tu número real

        function updateQty(val) {
            quantity = Math.max(1, quantity + val);
            document.getElementById('qty').innerText = quantity;
        }

        function sendOrder() {
            const notes = document.getElementById('notes').value;
            const total = quantity * burgerPrice;
            const formattedTotal = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(total);
            
            const message = `*NUEVO PEDIDO - MASTER BURGER*%0A` +
                            `-------------------------------%0A` +
                            `*Producto:* La Máster Vibras%0A` +
                            `*Cantidad:* ${quantity}%0A` +
                            `*Notas:* ${notes || 'Ninguna'}%0A` +
                            `*Total:* ${formattedTotal}%0A` +
                            `-------------------------------%0A` +
                            `¡Espero mi burger con las mejores vibras! 🚀`;

            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
