<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Burger | Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-yellow-400 pt-10 pb-16 px-6 text-center shadow-lg rounded-b-[4rem]">
        <h1 class="text-4xl font-black text-gray-900 italic uppercase tracking-tighter">Master Burger 2026</h1>
        <div class="inline-block bg-black text-white px-4 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase mt-2">
            Vibras Positivas Edition
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 -mt-10">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=800&auto=format&fit=crop" 
                     alt="La Master Burger" class="w-full h-64 object-cover">
                <div class="absolute bottom-4 left-6 bg-white/90 backdrop-blur px-4 py-1 rounded-xl shadow-lg font-black text-xl text-gray-800">
                    $18.000
                </div>
            </div>

            <div class="p-8">
                <h2 class="text-3xl font-black text-gray-800 mb-2 leading-none">La Máster Vibras</h2>
                <p class="text-gray-400 text-sm mb-6">Pan brioche, blend premium, mermelada de tocino y queso madurado.</p>

                <div class="space-y-4 mb-8">
                    <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Tus Datos</h3>
                    <input type="text" id="clientName" placeholder="Tu Nombre Completo" 
                        class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 focus:ring-2 focus:ring-yellow-400 focus:outline-none text-sm font-semibold">
                    
                    <input type="text" id="address" placeholder="Mesa # o Dirección de envío" 
                        class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 focus:ring-2 focus:ring-yellow-400 focus:outline-none text-sm font-semibold">
                </div>

                <div class="flex items-center justify-between bg-slate-100 p-2 rounded-2xl mb-6 border border-slate-200">
                    <button onclick="updateQty(-1)" class="w-12 h-12 bg-white rounded-xl shadow-sm text-2xl font-bold active:scale-90 transition">-</button>
                    <div class="text-center">
                        <span id="qty" class="text-2xl font-black block">1</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Unidades</span>
                    </div>
                    <button onclick="updateQty(1)" class="w-12 h-12 bg-white rounded-xl shadow-sm text-2xl font-bold active:scale-90 transition">+</button>
                </div>

                <div class="mb-8">
                    <textarea id="notes" 
                        class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-100 focus:ring-2 focus:ring-yellow-400 focus:outline-none text-sm"
                        placeholder="Notas: ¿Alguna alergia o término de la carne?" rows="2"></textarea>
                </div>

                <button onclick="sendOrder()" 
                    class="w-full bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-black py-5 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-3 text-lg uppercase tracking-wide">
                    <i class="fab fa-whatsapp text-2xl"></i>
                    Enviar pedido
                </button>
            </div>
        </div>

        <div class="mt-12 text-center border-t border-gray-200 pt-6">
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em]">
                &copy; 2026 Desarrollado por
            </p>
            <div class="flex justify-center items-center gap-2 mt-2">
                <span class="text-gray-900 font-black text-sm italic">VIBRAS POSITIVAS</span>
                <div class="h-1 w-1 bg-yellow-400 rounded-full"></div>
                <span class="text-gray-400 text-[10px] uppercase font-bold tracking-widest underline underline-offset-4 decoration-yellow-400">Derechos Reservados</span>
            </div>
        </div>
    </main>

    <script>
        let quantity = 1;
        const burgerPrice = 18000;
        const whatsappNumber = "573001234567"; // CAMBIA ESTO POR TU NÚMERO

        function updateQty(val) {
            quantity = Math.max(1, quantity + val);
            document.getElementById('qty').innerText = quantity;
        }

        function sendOrder() {
            const name = document.getElementById('clientName').value;
            const loc = document.getElementById('address').value;
            const notes = document.getElementById('notes').value;

            if (!name || !loc) {
                alert("Por favor completa tu nombre y ubicación para que podamos llevarte la burger.");
                return;
            }

            const total = quantity * burgerPrice;
            const formattedTotal = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(total);
            
            const message = `*NUEVO PEDIDO MASTER BURGER*%0A` +
                            `-------------------------------%0A` +
                            `👤 *Cliente:* ${name}%0A` +
                            `📍 *Ubicación:* ${loc}%0A` +
                            `🍔 *Producto:* La Máster Vibras%0A` +
                            `📦 *Cantidad:* ${quantity}%0A` +
                            `📝 *Notas:* ${notes || 'Sin notas'}%0A` +
                            `💰 *TOTAL:* ${formattedTotal}%0A` +
                            `-------------------------------%0A` +
                            `_App desarrollada por Vibras Positivas ©_`;

            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
