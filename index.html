<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boton Rojo Burguer | Vibras Positivas</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #000; color: white; overflow: hidden; }
        .pulse-red { animation: pulse 1.5s infinite; box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
        @keyframes pulse {
            0% { transform: scale(0.95); }
            70% { transform: scale(1); box-shadow: 0 0 20px 30px rgba(220, 38, 38, 0); }
            100% { transform: scale(0.95); }
        }
        .loader { border: 4px solid #333; border-top: 4px solid #dc2626; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen px-6">

    <div id="setup-screen" class="hidden fixed inset-0 bg-white z-50 p-8 flex flex-col justify-center text-black">
        <h3 class="text-red-600 font-black text-xl italic uppercase">¡Bienvenido Socio!</h3>
        <p class="text-gray-500 font-bold mb-6">Configura tu Botón Rojo para el Master.</p>
        <input type="text" id="userName" placeholder="¿Tu nombre?" class="w-full p-5 mb-4 border-2 border-gray-200 rounded-2xl font-bold text-xl outline-none focus:border-red-600">
        <input type="text" id="userAddress" placeholder="Referencia (Ej: Casa portón verde)" class="w-full p-5 mb-8 border-2 border-gray-200 rounded-2xl font-bold text-xl outline-none focus:border-red-600">
        <button onclick="saveData()" class="bg-red-600 text-white font-black py-5 rounded-2xl text-2xl uppercase active:scale-95 transition">ACTIVAR MI BOTÓN 🔴</button>
    </div>

    <div id="loading-gps" class="hidden fixed inset-0 bg-black/95 z-40 flex flex-col items-center justify-center">
        <div class="loader mb-6"></div>
        <p class="font-black uppercase text-red-600">RASTREANDO SEÑAL GPS...</p>
    </div>

    <div class="text-center w-full max-w-xs">
        <h1 class="text-yellow-400 text-3xl font-black italic mb-1 uppercase tracking-tighter">BURGUERABOCADOS</h1>
        <p id="welcome-user" class="text-gray-500 text-xs font-bold uppercase mb-8">Cargando...</p>
        
        <div class="flex items-center justify-between bg-zinc-900 p-4 rounded-3xl mb-8 border border-zinc-800">
            <button onclick="updateQty(-1)" class="w-14 h-14 bg-zinc-800 text-white rounded-2xl text-3xl font-black">-</button>
            <div class="text-center">
                <span id="display-qty" class="text-4xl font-black">1</span>
                <span class="text-[10px] text-yellow-400 font-bold uppercase block">Unidades</span>
            </div>
            <button onclick="updateQty(1)" class="w-14 h-14 bg-zinc-800 text-white rounded-2xl text-3xl font-black">+</button>
        </div>

        <button onclick="fireOrder()" class="pulse-red w-64 h-64 bg-red-600 rounded-full border-[12px] border-red-900/50 flex items-center justify-center active:scale-90 transition-transform mx-auto">
            <span class="text-white font-black text-4xl uppercase italic">ENVIAR<br>PEDIDO</span>
        </button>

        <button onclick="clearData()" class="mt-10 text-gray-700 text-[10px] uppercase font-black underline">Actualizar mis datos</button>
    </div>

    <script>
        const whatsappNumber = "573117700431"; 
        let quantity = 1;

        window.onload = () => {
            const savedName = localStorage.getItem('burguer_name');
            if (!savedName) {
                document.getElementById('setup-screen').classList.remove('hidden');
            } else {
                document.getElementById('welcome-user').innerText = `¡LISTO ${savedName.toUpperCase()}, PIDE YA!`;
            }
        };

        function updateQty(val) {
            quantity = Math.max(1, quantity + val);
            document.getElementById('display-qty').innerText = quantity;
        }

        function saveData() {
            const n = document.getElementById('userName').value.trim();
            const a = document.getElementById('userAddress').value.trim();
            if (n && a) {
                localStorage.setItem('burguer_name', n);
                localStorage.setItem('burguer_address', a);
                location.reload(); 
            } else { alert("Completa tus datos primero."); }
        }

        function fireOrder() {
            document.getElementById('loading-gps').classList.remove('hidden');
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const mapUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        sendOrder(mapUrl);
                    },
                    (err) => {
                        document.getElementById('loading-gps').classList.add('hidden');
                        if(confirm("GPS falló. ¿Enviar pedido solo con la referencia de tu casa?")) {
                            sendOrder("Ubicación GPS no compartida");
                        }
                    }, { enableHighAccuracy: true, timeout: 8000 }
                );
            } else { sendOrder("GPS no soportado"); }
        }

        function sendOrder(gps) {
            document.getElementById('loading-gps').classList.add('hidden');
            
            // SACAMOS LOS DATOS DE LA MEMORIA
            const name = localStorage.getItem('burguer_name') || "Cliente Desconocido";
            const ref = localStorage.getItem('burguer_address') || "Sin referencia";
            
            // GENERAMOS CONSECUTIVO DINÁMICO (#VN + 3 últimos dígitos de tiempo + random)
            const ticket = "VN-" + Date.now().toString().slice(-3) + Math.floor(Math.random() * 10);
            
            const ahora = new Date();
            const tiempo = ahora.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

            // EL MENSAJE QUE TE LLEGARÁ AL WHATSAPP
            const message = `*🚨 NUEVO PEDIDO ${ticket}*%0A` +
                            `-------------------------------%0A` +
                            `👤 *CLIENTE:* ${name}%0A` +
                            `🍔 *PEDIDO:* ${quantity} Burguerabocados%0A` +
                            `🏠 *REFERENCIA:* ${ref}%0A` +
                            `📍 *MAPA GPS:* ${gps}%0A` +
                            `⏰ *HORA:* ${tiempo}%0A` +
                            `-------------------------------%0A` +
                            `*App Botón Rojo - Vibras Positivas*`;

            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
        }

        function clearData() {
            if(confirm("¿Quieres cambiar tu nombre o dirección?")) {
                localStorage.clear();
                location.reload();
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log(e));
        }
    </script>
</body>
</html>
