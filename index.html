<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Botón Rojo | Burguerabocados</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="br.JPG">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #000; color: white; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .pulse-red { animation: pulse 1.5s infinite; box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
        @keyframes pulse {
            0% { transform: scale(0.95); }
            70% { transform: scale(1); box-shadow: 0 0 20px 30px rgba(220, 38, 38, 0); }
            100% { transform: scale(0.95); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen px-6">

    <div id="setup-screen" class="hidden fixed inset-0 bg-white z-50 p-8 flex flex-col justify-center text-black">
        <h3 class="text-red-600 font-black text-xl italic uppercase mb-2">¡Bienvenido Socio!</h3>
        <h2 class="text-4xl font-black mb-6 uppercase leading-none text-gray-900">CONFIGURA TU<br><span class="text-red-600">BOTÓN ROJO</span></h2>
        <p class="mb-6 font-bold text-gray-500">Pide desde la fila y agiliza tu entrega.</p>
        
        <input type="text" id="userName" placeholder="¿Tu nombre?" class="w-full p-5 mb-8 border-2 border-gray-200 rounded-2xl font-bold text-xl outline-none focus:border-red-600 text-black">
        
        <button onclick="saveData()" class="bg-red-600 text-white font-black py-5 rounded-2xl text-2xl uppercase shadow-xl active:scale-95 transition">ACTIVAR MI BOTÓN 🔴</button>
    </div>

    <div class="text-center w-full max-w-xs">
        <h1 class="text-yellow-400 text-3xl font-black italic mb-1 uppercase tracking-tighter">BURGUERABOCADOS</h1>
        <p id="welcome-msg" class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-8 italic">PWA Edition - Master de Tulio</p>
        
        <div class="flex items-center justify-between bg-zinc-900 p-4 rounded-3xl mb-8 border border-zinc-800">
            <button onclick="updateQty(-1)" class="w-14 h-14 bg-zinc-800 text-white rounded-2xl text-3xl font-black active:bg-red-600 transition">-</button>
            <div class="text-center">
                <span id="display-qty" class="text-4xl font-black">1</span>
                <span class="text-[10px] text-yellow-400 font-bold uppercase block">Unidades</span>
            </div>
            <button onclick="updateQty(1)" class="w-14 h-14 bg-zinc-800 text-white rounded-2xl text-3xl font-black active:bg-red-600 transition">+</button>
        </div>

        <button onclick="sendOrder()" class="pulse-red w-64 h-64 bg-red-600 rounded-full border-[12px] border-red-900/50 flex items-center justify-center active:scale-90 transition-transform mx-auto shadow-2xl">
            <span class="text-white font-black text-4xl uppercase leading-none italic">PEDIR<br>AHORA</span>
        </button>

        <button onclick="clearData()" class="mt-10 text-gray-700 text-[10px] uppercase font-black underline underline-offset-8">Cambiar mi nombre</button>
    </div>

    <footer class="fixed bottom-6 text-center w-full">
        <span class="text-white font-black text-sm italic tracking-widest uppercase">Vibras Positivas</span>
    </footer>

    <script>
        const whatsappNumber = "573117700431"; 
        let quantity = 1;

        window.onload = () => {
            const name = localStorage.getItem('burguer_name');
            if (!name) {
                document.getElementById('setup-screen').classList.remove('hidden');
            } else {
                document.getElementById('welcome-msg').innerText = `¡LISTO ${name.toUpperCase()}, PIDE DESDE LA FILA!`;
            }
        };

        function updateQty(val) {
            quantity = Math.max(1, quantity + val);
            document.getElementById('display-qty').innerText = quantity;
        }

        function saveData() {
            const n = document.getElementById('userName').value.trim();
            if (n) {
                localStorage.setItem('burguer_name', n);
                location.reload();
            } else { alert("Dinos tu nombre para el pedido."); }
        }

        function sendOrder() {
            const name = localStorage.getItem('burguer_name') || "Cliente";
            const ticket = "MSTR-" + Math.floor(Math.random() * 900 + 100);
            const ahora = new Date();
            const tiempo = ahora.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

            const message = `*🚨 PEDIDO MASTER ${ticket}*%0A` +
                            `-------------------------------%0A` +
                            `👤 *CLIENTE:* ${name}%0A` +
                            `🍔 *CANTIDAD:* ${quantity} Burguerabocados%0A` +
                            `📍 *ESTADO:* ¡EN FILA! 🏃‍♂️%0A` +
                            `⏰ *HORA:* ${tiempo}%0A` +
                            `-------------------------------%0A` +
                            `*App Botón Rojo - Vibras Positivas*`;

            window.location.href = `https://wa.me/${whatsappNumber}?text=${message}`;
        }

        function clearData() {
            if(confirm("¿Quieres cambiar tu nombre?")) {
                localStorage.clear();
                location.reload();
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(e => console.log(e));
        }
    </script>
</body>
</html>
